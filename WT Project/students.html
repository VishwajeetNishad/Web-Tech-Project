<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Management</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  </head>
  <body data-page="students">
    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <div class="brand"><img class="brand-logo" src="assets/images/niet-logo.svg" alt="NIET Logo" /> NIET Hostel Management</div>
        <a href="index.html" class="nav-link" data-page="dashboard"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
        <a href="students.html" class="nav-link" data-page="students"><i class="fa-solid fa-user-graduate"></i> Students</a>
        <a href="rooms.html" class="nav-link" data-page="rooms"><i class="fa-solid fa-door-open"></i> Rooms</a>
        <a href="payments.html" class="nav-link" data-page="payments"><i class="fa-solid fa-money-bill-wave"></i> Payments</a>
        <a href="electricity.html" class="nav-link" data-page="electricity"><i class="fa-solid fa-bolt"></i> Electricity</a>
        <a href="student-history.html" class="nav-link" data-page="history"><i class="fa-solid fa-clock-rotate-left"></i> Student History</a>
        <a href="settings.html" class="nav-link" data-page="settings"><i class="fa-solid fa-gear"></i> Settings</a>
      </aside>

      <main class="content">
        <div class="topbar">
          <h1>Student Management</h1>
          <div>
            <button class="btn mobile-toggle" id="menuToggle"><i class="fa-solid fa-bars"></i> Menu</button>
            <button class="btn btn-primary" data-open-modal="studentModal"><i class="fa-solid fa-user-plus"></i> Add Student</button>
          </div>
        </div>

        <div class="card">
          <div class="toolbar">
            <input id="studentSearch" type="text" placeholder="Search by name / phone / room..." />
            <select id="studentFilterStatus">
              <option value="">All Status</option>
              <option>Active</option>
              <option>Inactive</option>
            </select>
            <button class="btn" data-dummy="Students exported (UI simulation)."><i class="fa-solid fa-download"></i> Export CSV</button>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Phone</th>
                  <th>WhatsApp</th>
                  <th>Parent</th>
                  <th>Room</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="studentsTable"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <div class="modal" id="studentModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 style="margin: 0; font-size: 1.1rem">Add / Edit Student</h2>
          <button class="btn" data-close-modal>Close</button>
        </div>
        <form id="studentForm">
          <div class="form-grid">
            <div><label>Name</label><input id="studentName" type="text" placeholder="Student name" required /></div>
            <div><label>Phone Number</label><input id="studentPhone" type="text" placeholder="10-digit mobile" required /></div>
            <div><label>WhatsApp Number</label><input id="studentWhatsapp" type="text" placeholder="WhatsApp number" required /></div>
            <div><label>Email (optional)</label><input id="studentEmail" type="email" placeholder="example@mail.com" /></div>
            <div><label>Aadhaar Number</label><input id="studentAadhaar" type="text" placeholder="12-digit Aadhaar" required /></div>
            <div><label>Assigned Room</label><select id="studentRoom" required></select></div>
            <div><label>Parent Name</label><input id="studentParentName" type="text" placeholder="Parent name" required /></div>
            <div><label>Parent Phone</label><input id="studentParentPhone" type="text" placeholder="Parent phone" required /></div>
            <div><label>ID Proof Upload</label><input id="studentIdProof" type="file" accept="image/*" /></div>
            <div><label>Status</label><select id="studentStatus"><option>Active</option><option>Inactive</option></select></div>
          </div>
          <div class="actions">
            <button class="btn" type="button" data-close-modal>Cancel</button>
            <button class="btn btn-primary" type="submit">Save Student</button>
          </div>
        </form>
      </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/students.js"></script>
  </body>
</html>
